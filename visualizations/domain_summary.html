<!DOCTYPE html>
<html>
<head>
    <title>Domain Summary</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h1 { color: #2e75b6; }
    </style>
</head>
<body>
    <h1>Mean Sufficiency Scores by Water Domain</h1>
    <div id="chart"></div>
    <script>
        var domains = ["floods", "groundwater"];
        
        var trace1 = {
            x: domains,
            y: [0.1974069058903182, 0.21042918454935622],
            name: 'Early Warning',
            type: 'bar',
            marker: {color: '#e74c3c'}
        };
        
        var trace2 = {
            x: domains,
            y: [0.15049763033175353, 0.1640486409155937],
            name: 'Compliance Reporting',
            type: 'bar',
            marker: {color: '#2ecc71'}
        };
        
        var trace3 = {
            x: domains,
            y: [0.23104942450914015, 0.2608726752503576],
            name: 'Cross-Border',
            type: 'bar',
            marker: {color: '#3498db'}
        };
        
        var layout = {
            title: 'Task-Specific Sufficiency by Domain',
            yaxis: {title: 'Mean Sufficiency Score', range: [0, 1]},
            barmode: 'group'
        };
        
        Plotly.newPlot('chart', [trace1, trace2, trace3], layout);
    </script>
</body>
</html>
